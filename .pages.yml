media:
  name: images
  label: Images
  input: src/images
  output: src/images
  path: /src/images       # <--- UPDATED: Starts from project root, exactly like the working file
  extensions: [png, jpg, jpeg, webp, svg]

settings:
  content:
    merge: true

content:
  # ---------------------
  # NARRATIVE & CASE STUDIES (Was: Blog Posts)
  # ---------------------
  - name: posts
    label: Narrative & Case Studies
    type: collection
    path: src/content/posts
    filename: "{primary}.md"
    view:
      primary: title
      fields: [title, pubDate, team]
      sort: [pubDate]
      default: { sort: pubDate, order: desc }
    fields:
      - name: title
        label: Article Title
        type: string
        required: true
      - name: pubDate
        label: Date
        type: date
      - name: team
        label: Author / Curator
        type: string
      - name: description
        label: Summary
        type: text
      - name: image
        label: Cover Image
        type: object
        fields:
          - name: url
            label: Image
            type: image
            options:
              media: images
              path: blog
          - name: alt
            label: Alt text
            type: string
      - name: tags
        label: Tags (e.g., "Case Study", "Manifesto")
        type: string
        list: true
      - name: body
        label: Content
        type: rich-text

  # ---------------------
  # CERTIFIED ROBOTS (Was: Projects)
  # ---------------------
  - name: projects
    label: Certified Robots
    type: collection
    path: src/content/projects
    filename: "{primary}.md"
    view:
      primary: title
      fields: [title, status, year]
      sort: [pubDate]
      default: { sort: pubDate, order: desc }
    fields:
      - name: title
        label: Robot Name
        type: string
        required: true
      - name: pubDate
        label: Certified Date
        type: date
      - name: status
        label: Category
        type: string
        # These match your Storyboard columns!
        options: [high-volume, craft, compact, certified] 
      - name: client
        label: Manufacturer / Engine
        type: string
      - name: location
        label: Ideal For / Use Case
        type: string
      - name: year
        label: Throughput / Specs
        type: string
      - name: area
        label: Footprint (Dimensions)
        type: string
      - name: cover
        label: Hero Image
        type: object
        fields:
          - name: url
            label: Image
            type: image
            options:
              media: images
              path: projects
          - name: alt
            label: Alt text
            type: string
      - name: gallery
        label: Detail Gallery
        type: object
        list: true
        fields:
          - name: url
            label: Image
            type: image
            options:
              media: images
              path: projects
          - name: alt
            label: Alt text
            type: string
      - name: body
        label: Deep Dive / Tech Specs
        type: rich-text

  # ---------------------
  # TEAM (Curators)
  # ---------------------
  - name: team
    label: Curators & Team
    type: collection
    path: src/content/team
    filename: "{primary}.md"
    view:
      primary: name
      fields: [name, role]
      sort: [name]
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: role
        label: Role
        type: string
      - name: bio
        label: Bio
        type: text
      - name: image
        label: Profile Image
        type: object
        fields:
          - name: url
            label: Image
            type: image
            options:
              media: images
              path: team
          - name: alt
            label: Alt text
            type: string
      - name: socials
        label: Socials
        type: object
        fields:
          - { name: twitter,  label: X/Twitter URL, type: string }
          - { name: website,  label: Website URL,  type: string }
          - { name: linkedin, label: LinkedIn URL, type: string }
          - { name: email,    label: Email,        type: string }
      - name: body
        label: Body
        type: rich-text

  # ---------------------
  # SERVICES (Process)
  # ---------------------
  - name: services
    label: Services & Process
    type: collection
    path: src/content/services
    filename: "{primary}.md"
    view:
      primary: title
      fields: [title]
      sort: [title]
    fields:
      - name: title
        label: Service Step (e.g. Discovery)
        type: string
        required: true
      - name: description
        label: Short Description
        type: text
      - name: image
        label: Icon/Image
        type: object
        fields:
          - name: url
            label: Image
            type: image
            options:
              media: images
              path: services
          - name: alt
            label: Alt text
            type: string
      - name: body
        label: Long Description
        type: rich-text

  # ---------------------
  # LEGAL PAGES
  # ---------------------
  - name: legal
    label: Legal
    type: collection
    path: src/content/legal
    filename: "{primary}.md"
    view:
      primary: page
      fields: [page, pubDate]
      sort: [page]
    fields:
      - name: page
        label: Page Title
        type: string
        required: true
      - name: pubDate
        label: Effective Date
        type: date
      - name: body
        label: Legal Text
        type: rich-text